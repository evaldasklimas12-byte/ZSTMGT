name: 'ZST Run Setup'

on:
  workflow_dispatch:
    inputs:
      environmentName:
        description: GitHub environment name to run setup against
        required: true
  workflow_run:
    workflows: [' Publish To Environment', ' CI/CD']
    types: [completed]

permissions:
  actions: read
  contents: read

jobs:
  Prepare:
    runs-on: ubuntu-latest
    outputs:
      environmentName: ${{ steps.resolve.outputs.environmentName }}
      shouldRun: ${{ steps.resolve.outputs.shouldRun }}
    steps:
      - name: Resolve environment name
        id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName === 'workflow_dispatch') {
              core.setOutput('environmentName', context.payload.inputs.environmentName);
              core.setOutput('shouldRun', 'true');
              return;
            }
            // workflow_run: skip if the publish workflow failed
            if (context.payload.workflow_run.conclusion !== 'success') {
              core.info('Publish workflow did not succeed, skipping setup.');
              core.setOutput('shouldRun', 'false');
              return;
            }
            // Try reading environmentName from workflow inputs (PublishToEnvironment)
            const { data: run } = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.payload.workflow_run.id
            });
            let envName = (run.inputs && run.inputs.environmentName) ? run.inputs.environmentName : '';

            // If no input (e.g. CI/CD triggered by push), check deployed environments from jobs
            if (!envName || envName.includes('*')) {
              const { data: jobs } = await github.rest.actions.listJobsForWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.payload.workflow_run.id
              });
              const deployJobs = jobs.jobs.filter(j => j.conclusion === 'success' && j.environment);
              if (deployJobs.length === 1) {
                envName = deployJobs[0].environment;
                core.info(`Detected deployed environment from jobs: ${envName}`);
              } else if (deployJobs.length > 1) {
                const names = deployJobs.map(j => j.environment).join(', ');
                core.warning(`Multiple environments deployed: ${names}. Run 'ZST Run Setup' manually for each.`);
                core.setOutput('shouldRun', 'false');
                return;
              } else {
                core.info('No deployment environments found in completed workflow. Skipping setup.');
                core.setOutput('shouldRun', 'false');
                return;
              }
            }
            core.setOutput('environmentName', envName);
            core.setOutput('shouldRun', 'true');

  RunSetup:
    needs: [Prepare]
    if: needs.Prepare.outputs.shouldRun == 'true'
    runs-on: windows-latest
    name: Run ZST Setup on ${{ needs.Prepare.outputs.environmentName }}
    environment:
      name: ${{ needs.Prepare.outputs.environmentName }}
    defaults:
      run:
        shell: powershell
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize BC Setup via SOAP
        if: env.ZST_SETUP_CONTEXT != ''
        env:
          ZST_SETUP_CONTEXT: ${{ secrets.ZST_SETUP_CONTEXT }}
        run: .AL-Go/InvokeZSTSetup.ps1 -SetupContextJson $env:ZST_SETUP_CONTEXT

      - name: Skip - ZST_SETUP_CONTEXT not configured
        if: env.ZST_SETUP_CONTEXT == ''
        env:
          ZST_SETUP_CONTEXT: ${{ secrets.ZST_SETUP_CONTEXT }}
        run: Write-Warning "ZST_SETUP_CONTEXT secret is not set for this environment. Skipping setup."
